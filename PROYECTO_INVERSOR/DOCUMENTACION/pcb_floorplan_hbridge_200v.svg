<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .board{fill:#f6f8fb;stroke:#0f172a;stroke-width:5}
      .cut{fill:#fff;stroke:#64748b;stroke-width:2;stroke-dasharray:8 8}
      .title{font:700 34px Arial,sans-serif;fill:#111827}
      .sub{font:18px Arial,sans-serif;fill:#475569}
      .label{font:700 18px Arial,sans-serif;fill:#111827}
      .small{font:15px Arial,sans-serif;fill:#334155}
      .tiny{font:13px Arial,sans-serif;fill:#475569}
      .note{font:14px Arial,sans-serif;fill:#475569}
      .zoneHv{fill:#fff7ed;stroke:#f97316;stroke-width:3;stroke-dasharray:14 9}
      .zoneCtrl{fill:#eef2ff;stroke:#6366f1;stroke-width:3;stroke-dasharray:14 9}
      .zoneIso{fill:#ecfeff;stroke:#0891b2;stroke-width:3;stroke-dasharray:10 8}
      .zoneAc{fill:#f0fdf4;stroke:#16a34a;stroke-width:3;stroke-dasharray:10 8}
      .block{fill:#fff;stroke:#334155;stroke-width:3;rx:8}
      .hv{fill:#fee2e2;stroke:#dc2626;stroke-width:3;rx:8}
      .dc{fill:#fef3c7;stroke:#d97706;stroke-width:3;rx:8}
      .iso{fill:#e0f2fe;stroke:#0284c7;stroke-width:3;rx:8}
      .sense{fill:#ede9fe;stroke:#7c3aed;stroke-width:3;rx:8}
      .ctrl{fill:#dbeafe;stroke:#2563eb;stroke-width:3;rx:8}
      .conn{fill:#dcfce7;stroke:#16a34a;stroke-width:3;rx:8}
      .mech{fill:#e2e8f0;stroke:#475569;stroke-width:3;rx:6}
      .hvTrace{stroke:#dc2626;stroke-width:10;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .retTrace{stroke:#111827;stroke-width:10;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .acTrace{stroke:#16a34a;stroke-width:9;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .gateTrace{stroke:#0284c7;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .sigTrace{stroke:#2563eb;stroke-width:3;fill:none;stroke-linecap:round;stroke-dasharray:8 7}
      .auxTrace{stroke:#9333ea;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .isoBoundary{fill:#fff;stroke:#ef4444;stroke-width:2;stroke-dasharray:7 7;opacity:.95}
      .arrow{marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="35" y="35" width="1730" height="1130" class="board"/>
  <circle cx="95" cy="95" r="18" class="mech"/>
  <circle cx="1705" cy="95" r="18" class="mech"/>
  <circle cx="95" cy="1105" r="18" class="mech"/>
  <circle cx="1705" cy="1105" r="18" class="mech"/>

  <text x="80" y="88" class="title">PCB propuesta - puente H MSC, 200 VDC / 2 A</text>
  <text x="80" y="122" class="sub">Vista superior de colocacion: componentes grandes a escala relativa, conectores en bordes, potencia arriba, control abajo.</text>

  <rect x="70" y="160" width="1660" height="650" class="zoneHv"/>
  <text x="95" y="195" class="label">POTENCIA HV / CONMUTACION</text>
  <rect x="70" y="835" width="1660" height="295" class="zoneCtrl"/>
  <text x="95" y="872" class="label">CONTROL / BAJA TENSION</text>
  <rect x="1015" y="195" width="500" height="570" class="zoneIso"/>
  <text x="1040" y="230" class="label">DRIVERS Y FUENTES AISLADAS</text>
  <rect x="1525" y="195" width="170" height="570" class="zoneAc"/>
  <text x="1545" y="230" class="label">SALIDA AC</text>

  <!-- Left edge power inputs -->
  <rect x="95" y="300" width="135" height="105" class="conn"/>
  <text x="116" y="338" class="label">J_HV_IN</text>
  <text x="113" y="366" class="small">JL126 2P</text>
  <text x="113" y="390" class="tiny">+200V / GND_HV</text>

  <rect x="95" y="915" width="135" height="92" class="conn"/>
  <text x="119" y="948" class="label">J_5V</text>
  <text x="113" y="976" class="small">jack / bornera</text>
  <text x="113" y="998" class="tiny">5V_EXT</text>

  <!-- HV input chain -->
  <rect x="275" y="280" width="160" height="145" class="hv"/>
  <text x="300" y="322" class="label">FH1 + F1</text>
  <text x="297" y="352" class="small">porta fusible</text>
  <text x="297" y="377" class="small">5x20</text>
  <text x="297" y="402" class="tiny">ocupa bastante</text>

  <rect x="475" y="310" width="115" height="85" class="dc"/>
  <text x="503" y="344" class="label">RT1</text>
  <text x="494" y="371" class="small">NTC</text>

  <rect x="635" y="290" width="160" height="125" class="sense"/>
  <text x="659" y="329" class="label">IDC BUS</text>
  <text x="656" y="359" class="small">ACS724</text>
  <text x="656" y="384" class="tiny">IP+ -> IP- en +HV</text>

  <!-- DC link very close to MSC -->
  <rect x="835" y="235" width="145" height="235" class="dc"/>
  <text x="870" y="275" class="label">Cbulk</text>
  <text x="858" y="305" class="small">330uF</text>
  <text x="858" y="330" class="small">250V</text>
  <text x="858" y="357" class="tiny">snap-in</text>
  <text x="858" y="382" class="tiny">alto y pesado</text>
  <text x="858" y="435" class="tiny">pegado a DC bus</text>

  <rect x="840" y="500" width="135" height="82" class="dc"/>
  <text x="865" y="532" class="label">Cfilm</text>
  <text x="858" y="560" class="small">1uF 400V</text>

  <rect x="840" y="610" width="135" height="72" class="block"/>
  <text x="862" y="642" class="label">Rbleed</text>
  <text x="862" y="667" class="small">100k 2W</text>

  <rect x="650" y="485" width="155" height="115" class="sense"/>
  <text x="674" y="523" class="label">VDC BUS</text>
  <text x="670" y="552" class="small">AMC3330</text>
  <text x="670" y="576" class="tiny">divisor HV cerca</text>

  <!-- Main module -->
  <rect x="1035" y="330" width="290" height="235" class="hv"/>
  <text x="1082" y="374" class="label">MSC H-BRIDGE</text>
  <text x="1086" y="407" class="small">modulo grande</text>
  <text x="1086" y="435" class="small">DC+ / DC- a la izquierda</text>
  <text x="1086" y="463" class="small">AC_A / AC_B a la derecha</text>
  <text x="1086" y="505" class="tiny">zona termica y cobre ancho</text>

  <!-- Isolated supplies around module; each input fed by 5V_EXT -->
  <rect x="1045" y="250" width="170" height="78" class="iso"/>
  <text x="1062" y="281" class="label">A_HS 18V</text>
  <text x="1062" y="307" class="tiny">fuente + driver high A</text>

  <rect x="1045" y="570" width="170" height="78" class="iso"/>
  <text x="1062" y="601" class="label">A_LS 18V</text>
  <text x="1062" y="627" class="tiny">fuente + driver low A</text>

  <rect x="1235" y="250" width="170" height="78" class="iso"/>
  <text x="1252" y="281" class="label">B_HS 18V</text>
  <text x="1252" y="307" class="tiny">fuente + driver high B</text>

  <rect x="1235" y="570" width="170" height="78" class="iso"/>
  <text x="1252" y="601" class="label">B_LS 18V</text>
  <text x="1252" y="627" class="tiny">fuente + driver low B</text>

  <!-- AC output -->
  <rect x="1548" y="310" width="125" height="95" class="conn"/>
  <text x="1565" y="344" class="label">J_AC</text>
  <text x="1562" y="372" class="small">AC_A</text>
  <text x="1562" y="395" class="small">AC_B</text>

  <rect x="1450" y="435" width="145" height="92" class="sense"/>
  <text x="1475" y="469" class="label">VOUT</text>
  <text x="1468" y="497" class="small">AMC3330 AC</text>

  <rect x="1450" y="565" width="145" height="92" class="sense"/>
  <text x="1475" y="599" class="label">IOUT</text>
  <text x="1468" y="627" class="small">ACS/Hall AC</text>

  <rect x="1295" y="670" width="145" height="70" class="sense"/>
  <text x="1323" y="700" class="label">Sensor 5</text>
  <text x="1320" y="724" class="tiny">temp / aux / filtro</text>

  <!-- Control side -->
  <rect x="280" y="900" width="170" height="110" class="hv"/>
  <text x="304" y="937" class="label">FH_5V</text>
  <text x="302" y="966" class="small">porta fusible</text>
  <text x="302" y="992" class="tiny">entrada 5V_EXT</text>

  <rect x="495" y="888" width="185" height="132" class="dc"/>
  <text x="530" y="928" class="label">AUX 5V/3V3</text>
  <text x="525" y="958" class="small">5V_EXT filtrado</text>
  <text x="525" y="985" class="small">regulador 3.3V</text>

  <rect x="760" y="880" width="245" height="145" class="ctrl"/>
  <text x="835" y="923" class="label">STM32</text>
  <text x="795" y="956" class="small">PWM, DISABLE, ADC</text>
  <text x="795" y="984" class="tiny">no debajo del modulo MSC</text>

  <rect x="1045" y="895" width="165" height="105" class="block"/>
  <text x="1085" y="930" class="label">SWD</text>
  <text x="1068" y="958" class="small">NRESET</text>
  <text x="1068" y="982" class="small">BOOT0</text>

  <rect x="1260" y="870" width="235" height="150" class="sense"/>
  <text x="1305" y="912" class="label">Filtros ADC</text>
  <text x="1292" y="943" class="small">RC y proteccion ADC</text>
  <text x="1292" y="970" class="tiny">todas las salidas de sensores</text>

  <!-- Isolation boundaries -->
  <rect x="605" y="205" width="35" height="540" class="isoBoundary"/>
  <text x="565" y="198" class="tiny">frontera HV/control</text>
  <rect x="1512" y="215" width="28" height="520" class="isoBoundary"/>
  <text x="1470" y="210" class="tiny">zona AC</text>

  <!-- Main power routing -->
  <path d="M230 352 L275 352" class="hvTrace arrow"/>
  <path d="M435 352 L475 352" class="hvTrace arrow"/>
  <path d="M590 352 L635 352" class="hvTrace arrow"/>
  <path d="M795 352 L835 352" class="hvTrace arrow"/>
  <path d="M980 352 L1035 405" class="hvTrace arrow"/>
  <path d="M162 405 L162 760 L1180 760 L1180 565" class="retTrace"/>
  <path d="M908 470 L908 760" class="retTrace"/>
  <path d="M908 235 L908 190 L1180 190 L1180 330" class="hvTrace"/>
  <path d="M908 582 L908 760" class="retTrace"/>
  <path d="M908 682 L908 760" class="retTrace"/>

  <!-- AC routing -->
  <path d="M1325 400 L1548 345" class="acTrace arrow"/>
  <path d="M1325 500 L1548 385" class="acTrace arrow"/>
  <path d="M1450 610 L1365 520 L1325 500" class="acTrace"/>

  <!-- Gate routing -->
  <path d="M1130 328 L1105 330" class="gateTrace arrow"/>
  <path d="M1130 570 L1105 565" class="gateTrace arrow"/>
  <path d="M1320 328 L1255 360" class="gateTrace arrow"/>
  <path d="M1320 570 L1255 535" class="gateTrace arrow"/>

  <!-- 5V_EXT trunk to all isolated sources -->
  <path d="M230 960 L280 960" class="auxTrace arrow"/>
  <path d="M450 955 L495 955" class="auxTrace arrow"/>
  <path d="M680 945 L705 945 L705 815 L990 815 L990 215 L1130 215 L1130 250" class="auxTrace"/>
  <path d="M990 215 L1320 215 L1320 250" class="auxTrace"/>
  <path d="M990 815 L1130 815 L1130 648" class="auxTrace"/>
  <path d="M990 815 L1320 815 L1320 648" class="auxTrace"/>
  <text x="710" y="840" class="note">Bus 5V_EXT/GND_CONTROL a entradas de las 4 fuentes aisladas</text>

  <!-- Control/signal routing -->
  <path d="M882 880 L882 815" class="sigTrace"/>
  <path d="M882 815 L1130 648" class="sigTrace arrow"/>
  <path d="M882 815 L1130 328" class="sigTrace arrow"/>
  <path d="M882 815 L1320 648" class="sigTrace arrow"/>
  <path d="M882 815 L1320 328" class="sigTrace arrow"/>
  <path d="M1005 950 L1260 950" class="sigTrace arrow"/>
  <path d="M1260 910 L1475 527" class="sigTrace arrow"/>
  <path d="M1260 935 L1475 657" class="sigTrace arrow"/>
  <path d="M1260 960 L727 600" class="sigTrace arrow"/>
  <path d="M1260 985 L715 415" class="sigTrace arrow"/>

  <!-- Callouts -->
  <text x="775" y="222" class="note">DC-link aqui: minimo lazo DC+ / DC- / MSC.</text>
  <text x="1040" y="685" class="note">Las salidas 18V son flotantes: no unir GND_A_HS, GND_A_LS, GND_B_HS, GND_B_LS.</text>
  <text x="1345" y="785" class="note">AC_A/AC_B salen por borde derecho. Carga externa fuera de PCB.</text>
  <text x="735" y="1060" class="note">Mantener MCU y filtros ADC fuera de la zona de cobre HV y de los transformadores/fuentes aisladas.</text>

  <!-- Legend -->
  <rect x="75" y="1028" width="520" height="95" class="block"/>
  <text x="95" y="1058" class="label">Leyenda de flujo</text>
  <line x1="95" y1="1082" x2="150" y2="1082" class="hvTrace"/><text x="160" y="1088" class="tiny">DCLINK+_HV / DC+</text>
  <line x1="310" y1="1082" x2="365" y2="1082" class="retTrace"/><text x="375" y="1088" class="tiny">GND_HV / DC-</text>
  <line x1="95" y1="1108" x2="150" y2="1108" class="auxTrace"/><text x="160" y="1114" class="tiny">5V_EXT / GND_CONTROL</text>
  <line x1="310" y1="1108" x2="365" y2="1108" class="sigTrace"/><text x="375" y="1114" class="tiny">PWM / ADC</text>
</svg>
